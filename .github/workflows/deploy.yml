name: Build and Deploy Realm-Paper

on:
  push:
    branches:
      - '**'

env:
  PROJECT_NAME: 'Realm Paper'
  IMAGE_NAME: 'realm-paper'
  REGISTRY: 'registry.runicrealms.com'
  REGISTRY_PROJECT: 'build'

jobs:
  deploy:
    runs-on: rr-runner
    container:
      image: registry.runicrealms.com/agents/agent-base:latest
      credentials:
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}
      env:
        DOCKER_HOST: tcp://docker:2375
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord Start
        uses: Runic-Studios/Realm-Actions/discord-notify@main
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: 'START'
          project_name: ${{ env.PROJECT_NAME }}

      - name: Determine Environment
        id: env
        uses: Runic-Studios/Realm-Actions/determine-env@main

      - name: Pull External Artifacts
        uses: Runic-Studios/Realm-Actions/process-artifact-manifest@main
        with:
          manifest_file: 'artifact-manifest.yaml'
          registry_username: ${{ secrets.HARBOR_USERNAME }}
          registry_password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: Runic-Studios/Realm-Actions/docker-build-push@main
        with:
          dockerfile: 'Dockerfile'
          image_name: ${{ env.IMAGE_NAME }}
          tag: ${{ steps.vars.outputs.sha_short }}
          registry: ${{ env.REGISTRY }}
          registry_project: ${{ env.REGISTRY_PROJECT }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
          context: '.'

      - name: Update Realm-Deployment
        uses: Runic-Studios/Realm-Actions/update-manifest@main
        with:
          repository: 'Realm-Deployment'
          branch: 'dev'
          file_path: 'values.yaml'
          yq_path: '.paperFleet.tag'
          new_value: ${{ steps.vars.outputs.sha_short }}
          ssh_key: ${{ secrets.BOT_SSH_KEY }}
          commit_message: 'Update ${{ env.IMAGE_NAME }} tag to ${{ steps.vars.outputs.sha_short }}'

      - name: Create PR (Main Only)
        if: steps.env.outputs.run_main_deploy == 'true'
        uses: Runic-Studios/Realm-Actions/create-pr@main
        with:
          repository: 'Realm-Deployment'
          base: 'main'
          head: 'dev'
          title: 'AUTOGENERATED: Promote latest Realm-Paper image to production'
          body: 'Promoting Realm-Paper from dev to main.'
          gh_token: ${{ secrets.BOT_PAT }}

      - name: Notify Discord Success
        if: success()
        uses: Runic-Studios/Realm-Actions/discord-notify@main
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: 'SUCCESS'
          project_name: ${{ env.PROJECT_NAME }}

      - name: Notify Discord Failure
        if: failure()
        uses: Runic-Studios/Realm-Actions/discord-notify@main
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: 'FAILURE'
          project_name: ${{ env.PROJECT_NAME }}
